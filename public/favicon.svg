<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#000000" rx="10"/>

  <!-- Simplified glow -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Minimal grid (just a cross for clarity) -->
  <g stroke="#00e5ff" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <line x1="32" y1="14" x2="32" y2="50"/>
    <line x1="14" y1="32" x2="50" y2="32"/>
  </g>

  <!-- Central "crossing" square -->
  <rect x="22" y="22" width="20" height="20"
        fill="none"
        stroke="#bf00ff"
        stroke-width="4"
        rx="4"
        filter="url(#glow)"/>
</svg>