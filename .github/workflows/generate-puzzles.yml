name: Generate Monthly Puzzles

on:
  schedule:
    # Run at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch new theme words
        run: node scripts/fetch-theme-words.js

      - name: Generate new puzzles
        run: node scripts/generate-starters.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/themes.json public/data/puzzles.json public/data/puzzles/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generate new monthly puzzles" && git push)
